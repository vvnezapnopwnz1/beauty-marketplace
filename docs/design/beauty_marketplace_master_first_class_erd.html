<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const source = `erDiagram
  USERS ||--o| MASTER_PROFILES : "1:1 if master"
  USERS ||--o{ APPOINTMENTS : "client"
  MASTER_PROFILES ||--o{ MASTER_SERVICES : "personal catalog"
  MASTER_PROFILES ||--o{ SALON_MASTERS : "memberships"
  SALONS ||--o{ SALON_SERVICES : "catalog"
  SALONS ||--o{ SALON_MASTERS : "employs"
  SALONS ||--o{ APPOINTMENTS : "hosts"
  SALON_MASTERS ||--o{ SALON_MASTER_SERVICES : "performs"
  SALON_MASTERS ||--o{ SALON_MASTER_HOURS : "schedule"
  SALON_MASTERS ||--o{ APPOINTMENTS : "assigned to"
  SALON_SERVICES ||--o{ SALON_MASTER_SERVICES : "offered by"
  SALON_SERVICES ||--o{ APPOINTMENTS : "booked"
  SERVICE_CATEGORIES ||--o{ MASTER_SERVICES : "groups"
  SERVICE_CATEGORIES ||--o{ SALON_SERVICES : "groups"
  APPOINTMENTS ||--o| REVIEWS : "has"
  USERS {
    uuid id PK
    string phone_e164 UK
    enum global_role
  }
  MASTER_PROFILES {
    uuid id PK
    uuid user_id FK "nullable shadow"
    string display_name
    text bio
    string avatar_url
    array specializations
    float cached_rating
  }
  SALONS {
    uuid id PK
    string name
    string address
  }
  SALON_MASTERS {
    uuid id PK
    uuid salon_id FK
    uuid master_id FK
    string display_name_override
    string color
    enum role
    timestamp joined_at
    timestamp left_at
    bool is_active
  }
  MASTER_SERVICES {
    uuid id PK
    uuid master_id FK
    string category_slug FK
    string name
    int price_cents
    int duration_minutes
  }
  SALON_SERVICES {
    uuid id PK
    uuid salon_id FK
    string category_slug FK
    string name
    int price_cents
    int duration_minutes
  }
  SALON_MASTER_SERVICES {
    uuid salon_master_id PK
    uuid salon_service_id PK
    int price_override_cents
    int duration_override_minutes
  }
  SERVICE_CATEGORIES {
    string slug PK
    string parent_slug
    string name_ru
  }
  SALON_MASTER_HOURS {
    uuid id PK
    uuid salon_master_id FK
    int day_of_week
    string opens_at
    string closes_at
    bool is_day_off
    string break_starts_at
    string break_ends_at
  }
  APPOINTMENTS {
    uuid id PK
    uuid salon_id FK
    uuid salon_master_id FK
    uuid salon_service_id FK
    uuid client_user_id FK
    string guest_name
    timestamp starts_at
    timestamp ends_at
    enum status
  }
  REVIEWS {
    uuid id PK
    uuid appointment_id FK
    int rating
    text body
    text response_text
  }`;
const { svg } = await mermaid.render('erd-svg', source);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
